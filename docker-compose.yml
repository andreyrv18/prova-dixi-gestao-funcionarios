services:
  db:
    image: mysql:8.0
    container_name: db_gestao_funcionarios
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gestao_funcionarios
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gestao_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_gestao_funcionarios
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL:  jdbc:mysql://db:3306/gestao_funcionarios?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app_user
      SPRING_DATASOURCE_PASSWORD: app_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gestao_net


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_gestao_funcionarios
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - gestao_net


networks:
  gestao_net:
    driver: bridge


volumes:
  db_data:
