sevices:
  db:
    image: mysql:8.0
    container_name: db_gestao_funcionarios
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gestao_funcionarios
      MYSQL_USER: root
      MYSQL_PASSWORD: "${}"
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - gestao_net
    heathcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

backend:
  build:
    context: ./backend
    dockerfile: Dockerfile
  container_name: backend_gestao_funcionarios
  restart: always
  ports:
    - "8080:8080"
  environment:
    SPRING_DATASOURCE_URL: jdbc:mysql://
    SPRING_DATASOURCE_USERNAME: app_user
    SPRING_DATASOURCE_PASSWORD: app_password
  depends_on:
    db:
      condition: service_healthy
  networks:
    - gestao_net


  frontend:
    build:
    ports:
      - "${FRONTEND_PORT}:3000"

